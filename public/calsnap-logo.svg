<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A8E063"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="120" height="120" rx="28" fill="url(#bg)"/>

  <!-- Outer ring arc -->
  <circle cx="60" cy="58" r="34" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="6"/>
  <path d="M 60 24 A 34 34 0 1 1 26 58" fill="none" stroke="url(#ring)" stroke-width="6" stroke-linecap="round"/>

  <!-- Fork & knife icon inside -->
  <!-- Fork -->
  <line x1="52" y1="44" x2="52" y2="72" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="49" y1="44" x2="49" y2="51" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="44" x2="52" y2="51" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="55" y1="44" x2="55" y2="51" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M49 51 Q52 55 55 51" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Knife -->
  <line x1="68" y1="44" x2="68" y2="72" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M68 44 Q74 48 68 56" fill="rgba(255,255,255,0.5)" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- CalSnap text -->
  <text x="60" y="100" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="900" font-size="13" fill="white" letter-spacing="0.5">CalSnap</text>
</svg>
